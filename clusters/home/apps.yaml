apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./apps
  prune: true
  wait: true
  # SOPS decryption — Flux uses the age private key stored in the sops-age
  # Kubernetes secret to decrypt any *.enc.yaml files before applying them.
  # Create the secret once with:
  #   kubectl create secret generic sops-age \
  #     --namespace=flux-system \
  #     --from-file=age.agekey=$HOME/age.key
  decryption:
    provider: sops
    secretRef:
      name: sops-age
